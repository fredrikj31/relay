x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    container_name: relay-backend
    image: fredrikj31/relay-backend:latest
    restart: always
    profiles:
      - prod
    networks:
      - cloudflared
    ports:
      - 4002:3000
    logging: *default-logging

  frontend:
    container_name: relay-frontend
    image: fredrikj31/relay-frontend:latest
    restart: always
    profiles:
      - prod
    networks:
      - cloudflared
    ports:
      - 4003:80
    logging: *default-logging

networks:
  cloudflared:
    external: true
